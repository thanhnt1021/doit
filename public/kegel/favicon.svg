<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="orb" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#83E2DC"/>
      <stop offset="100%" stop-color="#2C9A94"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="15" fill="#0E1417"/>
  <!-- vòng nhịp (track + cung tiến trình teal) -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="4"/>
  <circle cx="32" cy="32" r="21" fill="none" stroke="#4FC4BE" stroke-width="4"
          stroke-linecap="round" stroke-dasharray="92 132" transform="rotate(-90 32 32)"/>
  <!-- lõi orb phát quang -->
  <circle cx="32" cy="32" r="11" fill="url(#orb)" filter="url(#glow)"/>
</svg>
